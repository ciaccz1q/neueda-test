
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Project</title>
    <style>
        :root {
            --bg-1: #f5efe6;
            --bg-2: #d7e8f7;
            --ink: #1f2430;
            --accent: #d95f29;
            --accent-2: #0f766e;
            --card: rgba(255, 255, 255, 0.72);
            --border: rgba(31, 36, 48, 0.14);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Trebuchet MS", "Segoe UI", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 15% 20%, rgba(217, 95, 41, 0.22), transparent 42%),
                radial-gradient(circle at 82% 14%, rgba(15, 118, 110, 0.2), transparent 45%),
                linear-gradient(120deg, var(--bg-1), var(--bg-2));
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .card {
            width: min(920px, 100%);
            background: var(--card);
            backdrop-filter: blur(6px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: clamp(24px, 4vw, 48px);
            box-shadow: 0 20px 44px rgba(17, 24, 39, 0.14);
            animation: rise 700ms ease-out;
        }

        .eyebrow {
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--accent-2);
            margin: 0 0 10px;
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 5vw, 3.8rem);
            line-height: 1.04;
            max-width: 14ch;
        }

        p {
            margin: 18px 0 0;
            max-width: 60ch;
            font-size: clamp(1rem, 2vw, 1.18rem);
            line-height: 1.6;
        }

        .actions {
            margin-top: 28px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .btn {
            display: inline-block;
            text-decoration: none;
            border-radius: 999px;
            padding: 12px 20px;
            font-weight: 700;
            transition: transform 180ms ease, box-shadow 180ms ease;
        }

        .btn-primary {
            color: #fff;
            background: var(--accent);
            box-shadow: 0 10px 24px rgba(217, 95, 41, 0.35);
        }

        .btn-secondary {
            color: var(--ink);
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.6);
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        @keyframes rise {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 640px) {
            .card {
                border-radius: 16px;
                padding: 22px;
            }
        }
    </style>
</head>
<body>
    <main class="card">
        <p class="eyebrow">Fresh Start</p>
        <h1>Build your next idea with confidence.</h1>
        <p>
            This page now has structure, visual direction, and responsive behavior.
            Use it as a clean base for your project sections, navigation, and content.
        </p>
        <div class="actions">
            <a class="btn btn-primary" href="#">Get Started</a>
            <a class="btn btn-secondary" href="#">See Features</a>
        </div>
    </main>

</body>
</html>
